name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Frontend CI ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check, lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: profchat-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: profchat-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0

      # Build with dummy env vars so the Vite build succeeds in CI.
      # Real values are injected only in the deploy workflow.
      - name: Build (smoke test)
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000/ws/chat
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-placeholder
          VITE_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
        run: npm run build

  # ── Backend CI ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint, docker build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: profchat-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: profchat-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install ruff (linter)
        run: pip install ruff

      - name: Lint
        run: ruff check .

      # Verify the Dockerfile builds successfully — catches broken deps early.
      - name: Docker build (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: profchat-backend
          push: false
          tags: kgpedia-backend:ci
