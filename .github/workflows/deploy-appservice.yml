name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── CI gate ────────────────────────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Build and deploy ───────────────────────────────────────────────────────
  deploy:
    name: Build → Docker Hub → App Service
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build frontend ─────────────────────────────────────────────────────
      # VITE_* vars are baked into the JS bundle at build time.
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: profchat-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: profchat-frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: profchat-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # Copy built frontend into the backend folder so the Docker image
      # includes it. FastAPI serves it via the FileResponse catch-all route.
      - name: Copy frontend dist into backend
        run: cp -r profchat-frontend/dist profchat-backend/dist

      # ── Build and push Docker image ────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: profchat-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/kgpedia-backend:latest

      # ── Deploy to Azure App Service ────────────────────────────────────────
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKERHUB_USERNAME }}/kgpedia-backend:latest
