# ─────────────────────────────────────────────────────────────────────────────
# NOTE: This file is NOT used in the current deployment.
# The app uses FastAPI's FileResponse to serve the frontend directly (no Nginx).
# This config is kept here only as a reference in case you ever want to
# switch back to an Nginx-fronted setup (e.g. when adding HTTPS via Caddy/Certbot).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Frontend (React SPA) ───────────────────────────────────────────────────
    root /var/www/kgpedia;
    index index.html;

    # SPA fallback: unknown paths serve index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API ──────────────────────────────────────────────────────
    # Covers: /api/session, /api/professions, /api/history/*
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Backend health check (useful for monitoring) ──────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── WebSocket (streaming AI chat) ─────────────────────────────────────────
    # CRITICAL: proxy_http_version 1.1 + Upgrade headers are required.
    # proxy_read_timeout must be long enough to survive the full AI stream.
    location /ws/ {
        proxy_pass             http://127.0.0.1:8000/ws/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_connect_timeout  10s;
    }
}
